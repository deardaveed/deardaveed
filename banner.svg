<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 320" width="960" height="320">
  <defs>
    <linearGradient id="neonGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f2fe" />
      <stop offset="100%" stop-color="#b162ff" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="textGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="960" height="320" fill="#0d1117" />
  
  <!-- Design Accents -->
  <!-- Grid/Dot Mesh (Subtle) -->
  <pattern id="dotGrid" width="20" height="20" patternUnits="userSpaceOnUse">
    <circle cx="2" cy="2" r="1" fill="#c9d1d9" opacity="0.05" />
  </pattern>
  <rect width="960" height="320" fill="url(#dotGrid)" />
  
  <!-- Ambient glow paths -->
  <path d="M 0,220 C 150,120 250,300 450,200 C 650,100 750,280 960,180" fill="none" stroke="url(#neonGrad)" stroke-width="3" opacity="0.35" filter="url(#glow)" />
  <path d="M 0,160 C 200,280 350,100 550,220 C 750,340 800,120 960,200" fill="none" stroke="#b162ff" stroke-width="2.5" opacity="0.25" filter="url(#glow)" />
  
  <!-- Hexagon accents -->
  <polygon points="120,80 135,88 135,103 120,110 105,103 105,88" fill="none" stroke="#00f2fe" stroke-width="1.5" opacity="0.2" />
  <polygon points="840,200 855,208 855,223 840,230 825,223 825,208" fill="none" stroke="#b162ff" stroke-width="1.5" opacity="0.2" />

  <!-- Center Typography -->
  <text x="50%" y="150" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-weight="bold" font-size="52" fill="#ffffff" text-anchor="middle" letter-spacing="2">
    David Huang
  </text>
  <text x="50%" y="200" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-weight="500" font-size="22" fill="url(#neonGrad)" text-anchor="middle" letter-spacing="1" filter="url(#textGlow)">
    Certified Public Accountant ➩ Software Engineer
  </text>
</svg>
